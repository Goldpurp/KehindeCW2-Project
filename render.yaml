services:
  - type: web
    name: kehindecw2-project
    runtime: static
    repo: https://github.com/Goldpurp/KehindeCW2-Project
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_AZURE_API_BASE_URL
        value: https://goldpurpapi174522579.azurewebsites.net/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
